name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger manually from GitHub UI

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Inject secrets into local.properties ───────────────────────────────
      #    Add these in GitHub → Settings → Secrets → Actions:
      #      TIKTOK_CLIENT_KEY, TIKTOK_CLIENT_SECRET,
      #      ELEVENLABS_API_KEY, ANTHROPIC_API_KEY,
      #      KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
      - name: Create local.properties from secrets
        run: |
          cat > local.properties << EOF
          tiktok.client.key=${{ secrets.TIKTOK_CLIENT_KEY }}
          tiktok.client.secret=${{ secrets.TIKTOK_CLIENT_SECRET }}
          elevenlabs.api.key=${{ secrets.ELEVENLABS_API_KEY }}
          anthropic.api.key=${{ secrets.ANTHROPIC_API_KEY }}
          EOF

      # ── 4. Gradle permission ──────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. Build DEBUG APK ────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 6. Sign & Build RELEASE APK ──────────────────────────────────────────
      - name: Decode keystore
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/streamvibe.keystore

      - name: Build Release APK
        if: github.ref == 'refs/heads/main'
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/streamvibe.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon --stacktrace

      # ── 7. Upload Debug APK artifact ──────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: StreamVibe-Debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 8. Upload Release APK artifact ────────────────────────────────────────
      - name: Upload Release APK
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: StreamVibe-Release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      # ── 9. Create GitHub Release on version tag (optional) ────────────────────
      #    Push a tag like v1.0.0 to auto-create a GitHub Release with the APK
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
